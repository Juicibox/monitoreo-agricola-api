<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Usuarios</title>

    <!-- Materialize -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">

    <!-- Iconos -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/estilos.css">

</head>

<body>

    <!-- Barra de navegación -->

    <nav class="green darken-3">

        <div class="nav-wrapper container">

            <a href="dashboard.html" class="brand-logo">
                🌱 Monitoreo Agrícola
            </a>

            <ul class="right">

                <li><a href="dashboard.html">Dashboard</a></li>
                <li class="active"><a href="usuarios.html">Usuarios</a></li>
                <li><a href="parcelas.html">Parcelas</a></li>
                <li><a href="cultivos.html">Cultivos</a></li>
                <li><a href="index.html">Cerrar sesión</a></li>

            </ul>

        </div>

    </nav>

    <div class="container">

        <h4>Gestión de Usuarios</h4>

        <p>
            Administre los usuarios registrados en el sistema.
        </p>

        <div class="right">

            <a class="btn green modal-trigger" href="#modalUsuario">

                <i class="material-icons left">person_add</i>

                Nuevo Usuario

            </a>

        </div>

        <br><br>

        <table class="highlight striped responsive-table">

            <thead>

                <tr>

                    <th>Nombre</th>
                    <th>Correo</th>
                    <th>Ubicación</th>
                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody id="tablaUsuarios">

            </tbody>

        </table>

    </div>

    <!-- Modal -->

    <div id="modalUsuario" class="modal">

        <div class="modal-content">

            <h4>Registrar Usuario</h4>

            <div class="input-field">

                <input id="nombre" type="text">

                <label for="nombre">Nombre</label>

            </div>

            <div class="input-field">

                <input id="correo" type="email">

                <label for="correo">Correo</label>

            </div>

            <div class="input-field">

                <input id="contrasena" type="password">

                <label for="contrasena">Contraseña</label>

            </div>

            <div class="input-field">

                <input id="ubicacion" type="text">

                <label for="ubicacion">Ubicación</label>

            </div>

        </div>

        <div class="modal-footer">

            <a href="#!"
                class="modal-close waves-effect waves-red btn-flat">

                Cancelar

            </a>

            <a href="#!"
                onclick="guardarUsuario()"
                class="waves-effect waves-light btn green">

                Guardar

            </a>

        </div>

    </div>

    <!-- Footer -->

    <footer class="page-footer green darken-3">

        <div class="container center">

            © 2026 Sistema de Monitoreo Agrícola

        </div>

    </footer>

    <!-- Scripts -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>

    <script src="js/config.js"></script>

    <script src="js/usuarios.js"></script>

</body>

</html>
